version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: georgensen-db
    environment:
      POSTGRES_USER: georgensen
      POSTGRES_PASSWORD: georgensen_password
      POSTGRES_DB: georgensen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U georgensen"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: georgensen-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://georgensen:georgensen_password@db:5432/georgensen
      JWT_SECRET: super-secret-key-change-in-production
      DEBUG: "True"
    ports:
      - "8000:8000"
    volumes:
      - ./backend-python/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    container_name: georgensen-frontend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  # Admin Dashboard
  admin:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.admin
    container_name: georgensen-admin
    ports:
      - "8081:8081"
    volumes:
      - ./admin:/app
    depends_on:
      - backend

  # Redis (Job Queue & Cache)
  redis:
    image: redis:7-alpine
    container_name: georgensen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

  # Celery Worker (Background Jobs)
  celery_worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: georgensen-celery-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      - redis
      - db
    environment:
      DATABASE_URL: postgresql://georgensen:georgensen_password@db:5432/georgensen
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./backend/app:/app/app
    networks:
      - default

  # Celery Beat (Scheduler for Periodic Tasks)
  celery_beat:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: georgensen-celery-beat
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      - redis
      - db
    environment:
      DATABASE_URL: postgresql://georgensen:georgensen_password@db:5432/georgensen
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./backend/app:/app/app
    networks:
      - default

  # Flower (Celery Monitoring)
  flower:
    image: mher/flower:2.0
    container_name: georgensen-flower
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    networks:
      - default

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: georgensen-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - default

  # Grafana (Metrics Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: georgensen-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - default

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: georgensen-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - admin
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: georgensen-network
