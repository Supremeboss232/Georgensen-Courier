<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Onboarding | Georjensen Admin</title>
</head>
<body>
    <div class="form-container">
        <h1>Courier Partner Onboarding Form</h1>
        <p>Complete this form to become a Georjensen delivery partner.</p>

        <form id="partnerForm" class="onboarding-form">
            <!-- Personal Information -->
            <section class="form-section">
                <h2>Personal Information</h2>

                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="fullName" required>
                </div>

                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" name="email" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label>Date of Birth *</label>
                        <input type="date" name="dob" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Identification Type *</label>
                    <select name="idType" required>
                        <option>Select ID Type</option>
                        <option>Driver's License</option>
                        <option>Passport</option>
                        <option>National ID</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>ID Number *</label>
                    <input type="text" name="idNumber" required>
                </div>
            </section>

            <!-- Vehicle Information -->
            <section class="form-section">
                <h2>Vehicle Information</h2>

                <div class="form-group">
                    <label>Vehicle Type *</label>
                    <select name="vehicleType" required>
                        <option>Select Vehicle Type</option>
                        <option>Motorcycle</option>
                        <option>Bicycle</option>
                        <option>Car</option>
                        <option>Van</option>
                        <option>Truck</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Vehicle Make *</label>
                        <input type="text" name="vehicleMake" placeholder="e.g., Toyota" required>
                    </div>
                    <div class="form-group">
                        <label>Vehicle Model *</label>
                        <input type="text" name="vehicleModel" placeholder="e.g., Camry" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>License Plate *</label>
                        <input type="text" name="licensePlate" required>
                    </div>
                    <div class="form-group">
                        <label>Year *</label>
                        <input type="number" name="vehicleYear" min="2010" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Insurance Provider *</label>
                    <input type="text" name="insuranceProvider" required>
                </div>

                <div class="form-group">
                    <label>Insurance Policy Number *</label>
                    <input type="text" name="policyNumber" required>
                </div>
            </section>

            <!-- Service Preferences -->
            <section class="form-section">
                <h2>Service Preferences</h2>

                <div class="form-group">
                    <label>Preferred Service Types *</label>
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" name="serviceType" value="local" checked>
                            Local Courier (Same-City)
                        </label>
                        <label>
                            <input type="checkbox" name="serviceType" value="intercity">
                            Inter-City Courier
                        </label>
                        <label>
                            <input type="checkbox" name="serviceType" value="international">
                            International (Phase 2)
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Service Area (City/Region) *</label>
                    <input type="text" name="serviceArea" placeholder="e.g., New York City" required>
                </div>

                <div class="form-group">
                    <label>Average Deliveries Per Day *</label>
                    <select name="deliveriesPerDay" required>
                        <option>Select range</option>
                        <option>1-5 deliveries</option>
                        <option>5-10 deliveries</option>
                        <option>10-20 deliveries</option>
                        <option>20+ deliveries</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Operating Hours *</label>
                    <div class="hours-group">
                        <input type="time" name="startTime" required> to <input type="time" name="endTime" required>
                    </div>
                </div>
            </section>

            <!-- Bank Information -->
            <section class="form-section">
                <h2>Payment Information</h2>

                <div class="form-group">
                    <label>Bank Name *</label>
                    <input type="text" name="bankName" required>
                </div>

                <div class="form-group">
                    <label>Account Holder Name *</label>
                    <input type="text" name="accountName" required>
                </div>

                <div class="form-group">
                    <label>Account Number *</label>
                    <input type="text" name="accountNumber" required>
                </div>

                <div class="form-group">
                    <label>Routing Number / SWIFT Code *</label>
                    <input type="text" name="routingNumber" required>
                </div>
            </section>

            <!-- Agreements -->
            <section class="form-section">
                <h2>Agreements & Acknowledgments</h2>

                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="agreement" value="terms" required>
                        I agree to the Georjensen Partner Terms & Conditions
                    </label>
                </div>

                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="agreement" value="privacy" required>
                        I have read and accepted the Privacy Policy
                    </label>
                </div>

                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="agreement" value="independent" required>
                        I understand I am an independent contractor
                    </label>
                </div>

                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" name="agreement" value="backgroundCheck" required>
                        I authorize Georjensen to conduct a background check
                    </label>
                </div>
            </section>

            <!-- Submission -->
            <div class="form-actions">
                <button type="reset" class="btn btn-secondary">Clear Form</button>
                <button type="submit" class="btn btn-primary">Submit Application</button>
            </div>
        </form>
    </div>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #0369a1 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .form-container h1 {
            color: #1e40af;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .form-container > p {
            color: #6b7280;
            margin-bottom: 30px;
        }

        .form-section {
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid #e5e7eb;
        }

        .form-section:last-child {
            border-bottom: none;
        }

        .form-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #1f2937;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #111827;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1e40af;
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .hours-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .hours-group input {
            flex: 1;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            font-weight: 400;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .btn-primary {
            background: #1e40af;
            color: #ffffff;
            flex: 1;
        }

        .btn-primary:hover {
            background: #1e3a8a;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #111827;
            border: 1px solid #d1d5db;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        @media (max-width: 600px) {
            .form-container {
                padding: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>

    <script>
        document.getElementById('partnerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = Object.fromEntries(formData);
            
            // Log data (in production, send to server)
            console.log('Partner Application:', data);
            
            // Show success message
            alert('Thank you! Your application has been submitted. We\'ll review it within 48 hours.');
            
            // Reset form
            this.reset();
        });
    </script>
</body>
</html>
