<!-- Reset Password Form -->
<form id="resetPasswordFormComponent" class="needs-validation" novalidate>
    <div class="mb-3">
        <label for="resetCode" class="form-label">Reset Code</label>
        <input type="text" class="form-control" id="resetCode" name="resetCode" placeholder="Enter the code from your email" required>
    </div>
    <div class="mb-3">
        <label for="newPassword" class="form-label">New Password</label>
        <input type="password" class="form-control" id="newPassword" name="newPassword" required>
        <small class="text-muted">At least 8 characters with uppercase, lowercase, and numbers</small>
    </div>
    <div class="mb-3">
        <label for="confirmNewPassword" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmNewPassword" name="confirmNewPassword" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Reset Password</button>
    <div class="text-center mt-3">
        <p><a href="/auth/login">Back to login</a></p>
    </div>
</form>
