<!-- Register Form -->
<form id="registerFormComponent" class="needs-validation" novalidate>
    <div class="row">
        <div class="col-md-6">
            <div class="mb-3">
                <label for="firstName" class="form-label">First Name</label>
                <input type="text" class="form-control" id="firstName" name="firstName" required>
            </div>
        </div>
        <div class="col-md-6">
            <div class="mb-3">
                <label for="lastName" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="lastName" name="lastName" required>
            </div>
        </div>
    </div>
    <div class="mb-3">
        <label for="registerEmail" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="registerEmail" name="email" required>
    </div>
    <div class="mb-3">
        <label for="registerPassword" class="form-label">Password</label>
        <input type="password" class="form-control" id="registerPassword" name="password" required>
    </div>
    <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
    </div>
    <div class="mb-3">
        <label for="accountType" class="form-label">I am a:</label>
        <select class="form-control" id="accountType" name="accountType" required>
            <option value="">-- Select --</option>
            <option value="customer">Customer</option>
            <option value="partner">Delivery Partner</option>
        </select>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="agreeTerms" name="agreeTerms" required>
        <label class="form-check-label" for="agreeTerms">I agree to the Terms of Service</label>
    </div>
    <button type="submit" class="btn btn-primary w-100">Create Account</button>
    <div class="text-center mt-3">
        <p>Already have an account? <a href="/auth/login">Login here</a></p>
    </div>
</form>
