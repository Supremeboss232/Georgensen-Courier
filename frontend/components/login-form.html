<!-- Login Form Wrapper -->
<div id="loginFormWrapper"></div>

<script>
// Load login form from forms subdirectory
fetch('/components/forms/login-form.html')
    .then(response => response.text())
    .then(html => {
        document.getElementById('loginFormWrapper').innerHTML = html;
        
        // Attach form submission handler
        const form = document.getElementById('loginFormComponent');
        if (form) {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                
                try {
                    const response = await fetch('/api/v1/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: email,
                            password: password
                        })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        localStorage.setItem('authToken', data.access_token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        window.location.href = '/customer/dashboard';
                    } else {
                        alert('Login failed. Please check your credentials.');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    alert('Login failed. Please try again.');
                }
            });
        }
    })
    .catch(error => console.error('Error loading login form:', error));
</script>
