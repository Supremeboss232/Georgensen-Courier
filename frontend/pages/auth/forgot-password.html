<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Georgensen Courier</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="/assets/lib/bootstrap/css/bootstrap.min.css">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="/assets/lib/fontawesome/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="/css/main.css">
    
    <!-- Guard Script: Prevent logged-in users from accessing this page -->
    <script src="/js/core/guards.js"></script>
    
    <style>
        /* Forgot Password Page Specific Styles */
        body.forgot-password-page {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .reset-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        
        .reset-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 100%;
        }
        
        .reset-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 10px 10px 0 0;
            text-align: center;
        }
        
        .reset-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        .reset-header p {
            font-size: 0.95rem;
            opacity: 0.95;
            margin: 0;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .form-control {
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            transition: border-color 0.3s;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-reset {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .reset-footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid #e0e0e0;
        }
        
        .reset-footer p {
            margin: 0.5rem 0;
            font-size: 0.95rem;
        }
        
        .reset-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .reset-footer a:hover {
            text-decoration: underline;
        }
        
        .help-text {
            font-size: 0.9rem;
            color: #666;
            margin-top: 1rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        
        .response-message {
            display: none;
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
            border: 1px solid;
            animation: slideIn 0.3s ease;
        }
        
        .response-message.show {
            display: block;
        }
        
        .success-message {
            background-color: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
        }
        
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
        
        .info-message {
            background-color: #d1ecf1;
            color: #0c5460;
            border-color: #bee5eb;
        }
        
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 1rem;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .icon-success {
            color: #28a745;
            margin-right: 0.5rem;
        }
        
        .icon-error {
            color: #dc3545;
            margin-right: 0.5rem;
        }
        
        .icon-info {
            color: #17a2b8;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body class="bg-light forgot-password-page">
    <!-- Public Navigation Bar -->
    <nav id="navbar-container"></nav>
    
    <!-- Reset Container -->
    <div class="reset-container">
        <div class="reset-card">
            <!-- Reset Header -->
            <div class="reset-header">
                <h1>🚚 Georgensen</h1>
                <p>Password Recovery</p>
            </div>
            
            <!-- Reset Form Body -->
            <div class="card-body p-4">
                <!-- Response Message (dynamic success/error) -->
                <div id="responseMessage" class="response-message">
                    <i id="responseIcon"></i>
                    <span id="responseText"></span>
                </div>
                
                <!-- Forgot Password Form -->
                <form id="forgotPasswordForm" novalidate>
                    <div class="form-group">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope"></i> Email Address
                        </label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            name="email" 
                            placeholder="your.email@georgensen.app"
                            required
                            aria-label="Email address for password reset">
                    </div>
                    
                    <!-- Help Text -->
                    <div class="help-text">
                        <i class="fas fa-info-circle"></i>
                        <strong>Check your email:</strong> We'll send you a secure link to reset your password. The link expires in 24 hours.
                    </div>
                    
                    <!-- Submit Button with Loading State -->
                    <button 
                        type="submit" 
                        class="btn btn-reset btn-primary w-100 mt-4"
                        id="submitBtn">
                        <span id="submitText">
                            <i class="fas fa-paper-plane"></i> Send Reset Link
                        </span>
                        <span id="submitSpinner" class="loading-spinner" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i> Sending...
                        </span>
                    </button>
                </form>
                
                <!-- Footer Links -->
                <div class="reset-footer">
                    <p><a href="/auth/login"><i class="fas fa-sign-in-alt"></i> Back to Login</a></p>
                    <p>Don't have an account? <a href="/auth/register"><i class="fas fa-user-plus"></i> Register here</a></p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Footer Container -->
    <footer id="footer-container"></footer>
    
    <!-- ======================== SCRIPTS ======================== -->
    <!-- Main App Initialization (navbar, logout, etc.) -->
    <script src="/js/main.js"></script>
    
    <!-- Core Authentication & Authorization -->
    <script src="/js/core/api.js"></script>
    
    <!-- Password Reset Handler with Async Email Task Integration -->
    <script src="/js/auth/reset.js"></script>
    
    <!-- Bootstrap JS for interactive components -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Load navbar and footer components -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Load public navbar component
            if (document.getElementById('navbar-container')) {
                fetch('/components/navbar-public.html')
                    .then(response => response.text())
                    .then(html => {
                        document.getElementById('navbar-container').innerHTML = html;
                    })
                    .catch(error => console.error('Error loading navbar:', error));
            }
            
            // Load footer component
            if (document.getElementById('footer-container')) {
                fetch('/components/footer.html')
                    .then(response => response.text())
                    .then(html => {
                        document.getElementById('footer-container').innerHTML = html;
                    })
                    .catch(error => console.error('Error loading footer:', error));
            }
        });
    </script>
</body>
</html>
