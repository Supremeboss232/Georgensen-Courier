<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipment History - Customer Portal</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/assets/lib/bootstrap/css/bootstrap.min.css">
</head>
<body>
    <nav id="navbar-container"></nav>
    
    <div class="container mt-4">
        <h2>Shipment History</h2>
        <div class="row mb-3">
            <div class="col-md-4">
                <input type="text" class="form-control" id="searchBox" placeholder="Search tracking number...">
            </div>
        </div>
        <table class="table table-striped mt-4" id="historyTable">
            <thead>
                <tr>
                    <th>Tracking #</th>
                    <th>Recipient</th>
                    <th>Destination</th>
                    <th>Status</th>
                    <th>Sent Date</th>
                    <th>Delivered Date</th>
                    <th>Cost</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="historyTableBody">
            </tbody>
        </table>
    </div>

    <footer id="footer-container"></footer>
    <script src="/js/core/api.js"></script>
    <script src="/js/core/auth.js"></script>
    <script src="/js/core/guards.js"></script>
    <script src="/js/customer/shipments.js"></script>
</body>
</html>
