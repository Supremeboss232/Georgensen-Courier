<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Shipment - Customer Portal</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/assets/lib/bootstrap/css/bootstrap.min.css">
</head>
<body>
    <nav id="navbar-container"></nav>
    
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h2>Create New Shipment</h2>
                <form id="createShipmentForm" class="mt-4">
                    <div class="row">
                        <div class="col-md-6">
                            <h5>Pickup Information</h5>
                            <div class="mb-3">
                                <label for="pickupAddress" class="form-label">Pickup Address</label>
                                <select class="form-control" id="pickupAddress" name="pickupAddress" required>
                                    <option value="">-- Select Address --</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h5>Delivery Information</h5>
                            <div class="mb-3">
                                <label for="recipientName" class="form-label">Recipient Name</label>
                                <input type="text" class="form-control" id="recipientName" name="recipientName" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="recipientEmail" class="form-label">Recipient Email</label>
                                <input type="email" class="form-control" id="recipientEmail" name="recipientEmail" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="recipientPhone" class="form-label">Recipient Phone</label>
                                <input type="tel" class="form-control" id="recipientPhone" name="recipientPhone" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-12">
                            <div class="mb-3">
                                <label for="deliveryAddress" class="form-label">Delivery Address</label>
                                <input type="text" class="form-control" id="deliveryAddress" name="deliveryAddress" required>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <h5>Package Details</h5>
                            <div class="mb-3">
                                <label for="weight" class="form-label">Weight (kg)</label>
                                <input type="number" class="form-control" id="weight" name="weight" step="0.1" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="dimensions" class="form-label">Dimensions (L x W x H)</label>
                                <input type="text" class="form-control" id="dimensions" name="dimensions" placeholder="e.g., 10x10x10" required>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Package Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="serviceType" class="form-label">Service Type</label>
                        <select class="form-control" id="serviceType" name="serviceType" required>
                            <option value="">-- Select Service --</option>
                            <option value="standard">Standard (5-7 days)</option>
                            <option value="express">Express (2-3 days)</option>
                            <option value="overnight">Overnight</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">Create Shipment</button>
                </form>
            </div>
        </div>
    </div>

    <footer id="footer-container"></footer>
    <script src="/js/core/api.js"></script>
    <script src="/js/core/auth.js"></script>
    <script src="/js/core/guards.js"></script>
    <script src="/js/customer/shipments.js"></script>
</body>
</html>
